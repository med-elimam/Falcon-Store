# إعداد نشر Falcon Store API على Railway
# Root Directory في خدمة Railway يبقى جذر المستودع (monorepo)؛
# أوامر البناء والتشغيل أدناه تتكفل بمساحات العمل.

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build -w @falcon/api"
watchPatterns = ["apps/api/**", "packages/**"]

[deploy]
startCommand = "npm run migrate -w @falcon/database && node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
